image:
  registry: docker.io
  repository: bitnami/keycloak
  tag: 26.3.1-debian-12-r1
global:
  security:
    allowInsecureImages: true
auth:
  adminUser: admin
  adminPassword: "admin123"

service:
  type: ClusterIP

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r0
  auth:
    username: keycloak
    password: "keycloak123"
    database: keycloak

# ─── keycloak-config-cli ────────────────────────────────────────────
keycloakConfigCli:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/keycloak-config-cli
    tag: 6.4.0-debian-12-r11

  configuration:
    mi-realm.json: |
      {
        "realm": "mi-realm",
        "enabled": true,
        "displayName": "Mi Realm de Práctica",

        "clients": [
          {
            "clientId": "mi-app",
            "enabled": true,
            "publicClient": true,
            "redirectUris": ["*"],
            "webOrigins": ["*"],
            "defaultClientScopes": [
              "web-origins",
              "profile",
              "roles",
              "email",
              "mi-scope"
            ]
          }
        ],

        "clientScopes": [
          {
            "name": "mi-scope",
            "description": "Scope personalizado para mi-app",
            "protocol": "openid-connect",
            "attributes": {
              "include.in.token.scope": "true"
            },
            "protocolMappers": [
              {
                "name": "mi-scope-mapper",
                "protocol": "openid-connect",
                "protocolMapper": "oidc-usermodel-realm-role-mapper",
                "config": {
                  "claim.name": "roles",
                  "jsonType.label": "String",
                  "access.token.claim": "true",
                  "id.token.claim": "true"
                }
              }
            ]
          }
        ],

        "roles": {
          "client": {
            "mi-app": [
              { "name": "app-admin",  "description": "Administrador de la app" },
              { "name": "app-user",   "description": "Usuario estándar" },
              { "name": "app-viewer", "description": "Solo lectura" }
            ]
          }
        },

        "users": [
          {
            "username": "testuser",
            "enabled": true,
            "email": "testuser@example.com",
            "credentials": [
              { "type": "password", "value": "test123", "temporary": false }
            ],
            "clientRoles": {
              "mi-app": ["app-user"]
            }
          }
        ]
      }