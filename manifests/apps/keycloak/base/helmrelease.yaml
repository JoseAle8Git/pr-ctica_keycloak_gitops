apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: "25.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: keycloak
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: keycloak-values
      valuesKey: values.yaml