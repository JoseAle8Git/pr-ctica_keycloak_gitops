apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: keycloak
      version: "25.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 1m
  values:
    auth:
      adminUser: admin
      adminPassword: "admin123"
    service:
      type: ClusterIP
    postgresql:
      enabled: true
      auth:
        username: keycloak
        password: "keycloak123"
        database: keycloak
    keycloakConfigCli:
      enabled: true
      configuration:
        mi-realm.json: |
          {
            "realm": "mi-realm",
            "enabled": true,
            "displayName": "Mi Realm de Práctica",
            "clients": [
              {
                "clientId": "mi-app",
                "enabled": true,
                "publicClient": true,
                "redirectUris": ["*"],
                "webOrigins": ["*"],
                "defaultClientScopes": [
                  "web-origins", "profile", "roles", "email", "mi-scope"
                ]
              }
            ],
            "clientScopes": [
              {
                "name": "mi-scope",
                "description": "Scope personalizado para mi-app",
                "protocol": "openid-connect",
                "attributes": { "include.in.token.scope": "true" },
                "protocolMappers": [
                  {
                    "name": "mi-scope-mapper",
                    "protocol": "openid-connect",
                    "protocolMapper": "oidc-usermodel-realm-role-mapper",
                    "config": {
                      "claim.name": "roles",
                      "jsonType.label": "String",
                      "access.token.claim": "true",
                      "id.token.claim": "true"
                    }
                  }
                ]
              }
            ],
            "roles": {
              "client": {
                "mi-app": [
                  { "name": "app-admin",  "description": "Administrador de la app" },
                  { "name": "app-user",   "description": "Usuario estándar" },
                  { "name": "app-viewer", "description": "Solo lectura" }
                ]
              }
            },
            "users": [
              {
                "username": "testuser",
                "enabled": true,
                "email": "testuser@example.com",
                "credentials": [
                  { "type": "password", "value": "test123", "temporary": false }
                ],
                "clientRoles": { "mi-app": ["app-user"] }
              }
            ]
          }